{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hostel Food Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container fade-in-up">
    <!-- MESSAGES ALERT -->
    {% if messages %}
        <div class="row justify-content-center mt-4">
            <div class="col-lg-4 col-md-6 col-sm-10">
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show shadow-sm mb-0" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        </div>
    {% endif %}

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome Back</h3>
                <p>Log in to review and share feedback on hostel meals</p>
            </div>
            <div class="auth-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <button class="btn-custom-primary w-100 mt-3" type="submit">
                        Log In
                    </button>
                </form>

                <div class="auth-footer">
                    New student? <a href="/register/">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
