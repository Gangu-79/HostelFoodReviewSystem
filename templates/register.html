{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Hostel Food Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container fade-in-up">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Create Account</h3>
                <p>Register to rate and review today's hostel menu</p>
            </div>
            <div class="auth-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <button class="btn-custom-primary w-100 mt-3" type="submit">
                        Register Account
                    </button>
                </form>

                <div class="auth-footer">
                    Already registered? <a href="/accounts/login/">Log in here</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
